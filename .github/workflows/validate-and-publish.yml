name: Validate and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build validator
        run: cargo build --release --manifest-path validator/Cargo.toml

      - name: Validate recommendations
        run: |
          ./validator/target/release/validate recommendations --output recommendations.toml --generate-docs book/src/recommendations.md

      - name: Install mdbook
        run: cargo install mdbook --locked

      - name: Build book
        run: mdbook build book

      - name: Copy recommendations.toml to book output
        run: cp recommendations.toml book/book/

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
